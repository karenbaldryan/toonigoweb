server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css text/html application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location = / {
        try_files /index.html =404;
    }

    # Support extensionless URLs (e.g. /privacy-en, /privacy-ru) so they're
    # clean to use as App Store privacy policy URLs.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache HTML lightly so updates are picked up quickly
    location ~ \.html$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # CSS can cache longer since the filename is stable
    location ~ \.css$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Hide nginx version
    server_tokens off;
}

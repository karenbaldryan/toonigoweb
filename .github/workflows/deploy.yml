name: Deployment
on:
  push:
    branches: [master]

jobs:
  push_to_registry:
    name: Push Docker image to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference (lowercase)
        id: image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "ref=ghcr.io/${REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deployment:
    needs: push_to_registry
    name: deploying toonigoweb to production server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up deployment folder
        run: |
          ls -la
          mkdir -p /home/ubuntu/actions-deployments/toonigoweb
          IMAGE="${{ needs.push_to_registry.outputs.image }}:latest"
          sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" docker-compose.prod.yml \
            > /home/ubuntu/actions-deployments/toonigoweb/docker-compose.yaml

      - name: Deploy with Docker Compose
        run: |
          cd /home/ubuntu/actions-deployments/toonigoweb
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose pull
          docker compose up -d
          docker logout ghcr.io
